<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Loan Calculator</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      background: #f9f9f9;
      color: #333;
    }

    h2 {
      text-align: center;
      color: #2c3e50;
      margin-bottom: 30px;
    }

    label {
      margin-bottom: 15px;
      display: flex;
      flex-direction: column;
      font-weight: 500;
      color: #444;
    }

    input[type="number"],
    input[type="date"],
    input[type="month"] {
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 6px;
      width: 250px;
      font-size: 14px;
      margin-top: 5px;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button:hover {
      background: #2980b9;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 30px;
      background: white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    th, td {
      padding: 10px;
      text-align: center;
      border: 1px solid #e0e0e0;
    }

    th {
      background: #f0f4f8;
      color: #333;
    }

    tr:nth-child(even) {
      background: #f9f9f9;
    }

    .summary {
      margin-top: 30px;
      background: #eaf2f8;
      padding: 20px;
      border-radius: 6px;
      font-size: 16px;
    }

    .summary p {
      margin: 10px 0;
      color: #2c3e50;
    }

    #repaymentForm label {
      margin-bottom: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    #repaymentForm input[type="month"] {
      width: auto;
      font-weight: bold;
      background: #ecf0f1;
      border: none;
    }

    @media (max-width: 600px) {
      input[type="number"], input[type="date"], input[type="month"] {
        width: 100%;
      }

      label {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>

<h2>Loan Calculator</h2>

<label>Loan Amount: <input type="number" id="loanAmount" /></label>
<label>Annual Interest Rate (%): <input type="number" id="interestRate" /></label>
<label>Start Date (Loan Disbursed): <input type="date" id="startDate" /></label>
<label>End Date (Final Simulation Month): <input type="date" id="endDate" /></label>

<button onclick="generateRepaymentInputs()">Generate Monthly Inputs</button>

<div id="repaymentForm" style="margin-top:20px;"></div>
<div id="result"></div>

<script>
function getMonthDiff(d1, d2) {
  return (d2.getFullYear() - d1.getFullYear()) * 12 + (d2.getMonth() - d1.getMonth());
}

function generateRepaymentInputs() {
  const start = new Date(document.getElementById('startDate').value);
  const end = new Date(document.getElementById('endDate').value);
  const container = document.getElementById('repaymentForm');
  container.innerHTML = '';

  if (!start || !end || end <= start) {
    alert("Please enter valid dates.");
    return;
  }

  const firstRepaymentDate = new Date(start);
  firstRepaymentDate.setMonth(firstRepaymentDate.getMonth() + 1);

  const months = getMonthDiff(firstRepaymentDate, end) + 1;

  let html = '<h3>Repayment Entries</h3>';
  for (let i = 0; i < months; i++) {
    const monthDate = new Date(firstRepaymentDate);
    monthDate.setMonth(monthDate.getMonth() + i);
    const monthStr = monthDate.toISOString().slice(0, 7);

    html += `
      <label>${monthStr} - Amount Paid:
        <input type="month" value="${monthStr}" readonly />
        <input type="number" name="repay-${monthStr}" placeholder="Amount" />
      </label>
    `;
  }

  html += `<button onclick="calculate()">Calculate Repayments</button>`;
  container.innerHTML = html;
}

function calculate() {
  const loanAmount = parseFloat(document.getElementById('loanAmount').value);
  const interestRate = parseFloat(document.getElementById('interestRate').value) / 100 / 12;
  const start = new Date(document.getElementById('startDate').value);
  const end = new Date(document.getElementById('endDate').value);
  const firstRepayment = new Date(start);
  firstRepayment.setMonth(firstRepayment.getMonth() + 1);

  const months = getMonthDiff(firstRepayment, end) + 1;
  let currentDate = new Date(firstRepayment);
  let principal = loanAmount;
  let pendingInterest = 0;
  let totalPaid = 0;
  let totalInterestPaid = 0;

  let rows = [];

  for (let i = 0; i < months; i++) {
    const monthStr = currentDate.toISOString().slice(0, 7);
    const input = document.querySelector(`[name="repay-${monthStr}"]`);
    const paid = parseFloat(input?.value || 0);
    totalPaid += paid;

    const thisMonthInterest = +(principal * interestRate).toFixed(2);
    let paidToPendingInterest = 0;
    let paidToCurrentInterest = 0;
    let paidToPrincipal = 0;

    let balance = paid;

    if (balance >= pendingInterest) {
      paidToPendingInterest = pendingInterest;
      balance -= pendingInterest;
      pendingInterest = 0;
    } else {
      paidToPendingInterest = balance;
      pendingInterest -= balance;
      balance = 0;
    }

    if (balance >= thisMonthInterest) {
      paidToCurrentInterest = thisMonthInterest;
      balance -= thisMonthInterest;
    } else {
      paidToCurrentInterest = balance;
      pendingInterest += (thisMonthInterest - balance);
      balance = 0;
    }

    paidToPrincipal = balance;
    principal = +(principal - paidToPrincipal).toFixed(2);
    if (principal < 0) principal = 0;

    totalInterestPaid += paidToPendingInterest + paidToCurrentInterest;

    rows.push({
      month: monthStr,
      paid,
      paidToPendingInterest,
      paidToCurrentInterest,
      paidToPrincipal,
      pendingInterest: pendingInterest.toFixed(2),
      principal: principal.toFixed(2)
    });

    currentDate.setMonth(currentDate.getMonth() + 1);
  }

  let html = `<table>
    <tr>
      <th>Month</th>
      <th>Paid</th>
      <th>To Old Interest</th>
      <th>To Current Interest</th>
      <th>To Principal</th>
      <th>Pending Interest</th>
      <th>Remaining Principal</th>
    </tr>`;

  rows.forEach(row => {
    html += `<tr>
      <td>${row.month}</td>
      <td>${row.paid.toFixed(2)}</td>
      <td>${row.paidToPendingInterest.toFixed(2)}</td>
      <td>${row.paidToCurrentInterest.toFixed(2)}</td>
      <td>${row.paidToPrincipal.toFixed(2)}</td>
      <td>${row.pendingInterest}</td>
      <td>${row.principal}</td>
    </tr>`;
  });

  html += `</table>`;

  html += `<div class="summary">
    <p>Total Paid: ₹${totalPaid.toFixed(2)}</p>
    <p>Total Interest Paid: ₹${totalInterestPaid.toFixed(2)}</p>
    <p>Pending Interest: ₹${pendingInterest.toFixed(2)}</p>
    <p>Remaining Principal: ₹${principal.toFixed(2)}</p>
  </div>`;

  document.getElementById('result').innerHTML = html;
}
</script>

</body>
</html>
